<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>方块跳跃小游戏</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="ui-overlay">
      <div id="score-display">分数: <span id="score">0</span></div>
      <div id="high-score-display">最高分: <span id="highScore">0</span></div>
    </div>
    <div id="start-screen" class="screen">
      <h1>方块跳跃</h1>
      <p>点击屏幕跳跃</p>
      <div class="high-scores-container">
        <h3>🏆 历史记录</h3>
        <div id="start-high-scores-list"></div>
      </div>
      <button id="startBtn">开始游戏</button>
    </div>
    <div id="game-over-screen" class="screen hidden">
      <h1>游戏结束</h1>
      <p>得分: <span id="finalScore">0</span></p>
      <div class="high-scores-container">
        <h3>🏆 历史记录</h3>
        <div id="gameover-high-scores-list"></div>
      </div>
      <button id="restartBtn">重新开始</button>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
