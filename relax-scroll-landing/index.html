<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>治愈时光 | 视差滚动</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <section class="section section-hero" data-section="0">
        <div class="section-bg">
            <div class="bg-gradient bg-gradient-1"></div>
            <div class="bg-mountains bg-mountains-1"></div>
            <div class="bg-clouds bg-clouds-1"></div>
        </div>
        <div class="section-content">
            <h1 class="hero-title">
                <span class="line">慢下来</span>
                <span class="line">感受时光</span>
            </h1>
            <p class="subtitle">在宁静中寻找内心的平和</p>
        </div>
    </section>
    
    <section class="section section-1" data-section="1">
        <div class="section-bg">
            <div class="bg-gradient bg-gradient-2"></div>
            <div class="bg-mountains bg-mountains-2"></div>
            <div class="bg-trees bg-trees-2"></div>
        </div>
        <div class="section-content">
            <div class="text-block">
                <h2>清晨的阳光</h2>
                <p>当第一缕阳光穿透薄雾，温柔地洒在大地上，新的一天开始了。深呼吸，感受空气中清新的气息，让心灵在这一刻得到宁静。</p>
            </div>
        </div>
    </section>
    
    <section class="section section-2" data-section="2">
        <div class="section-bg">
            <div class="bg-gradient bg-gradient-3"></div>
            <div class="bg-mountains bg-mountains-3"></div>
            <div class="bg-mist bg-mist-3"></div>
        </div>
        <div class="section-content">
            <div class="text-block">
                <h2>自然的呼唤</h2>
                <p>山峦叠翠，云雾缭绕。大自然用它最温柔的方式拥抱着每一个到来的人。在这里，时间仿佛慢了下来，所有的烦恼都随风而去。</p>
            </div>
        </div>
    </section>
    
    <section class="section section-3" data-section="3">
        <div class="section-bg">
            <div class="bg-gradient bg-gradient-4"></div>
            <div class="bg-forest bg-forest-4"></div>
            <div class="bg-light bg-light-4"></div>
        </div>
        <div class="section-content">
            <div class="text-block">
                <h2>内心的平静</h2>
                <p>在这个喧嚣的世界里，给自己一片安静的空间。倾听内心的声音，找到真正的自己。平静，不是远离喧嚣，而是在心中修篱种菊。</p>
            </div>
        </div>
    </section>
    
    <section class="section section-footer" data-section="4">
        <div class="section-bg">
            <div class="bg-gradient bg-gradient-5"></div>
            <div class="bg-sunset bg-sunset-5"></div>
            <div class="bg-particles bg-particles-5"></div>
        </div>
        <div class="section-content">
            <div class="text-block">
                <h2>开始你的旅程</h2>
                <p>每一步都是新的开始，每一天都是新的希望。愿你在这趟人生旅途中，找到属于自己的那份宁静与美好。</p>
                <button class="cta-btn">探索更多</button>
            </div>
        </div>
    </section>
    
    <script src="script.js"></script>
</body>
</html>
